version: '3.8'

services:
  localstack:
    image: localstack/localstack
    container_name: localstack-qrcode
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1

  setup-bucket:
    image: amazon/aws-cli
    container_name: setup-s3-qrcode
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: /bin/sh -c
    command: >
      "
      echo 'Aguardando o LocalStack ficar pronto...';
      sleep 10;
      aws --endpoint-url=http://localstack:4566 s3 mb s3://qrcode-bucket;
      echo 'Bucket qrcode-bucket criado com sucesso!';
      "